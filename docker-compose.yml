version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: amazon-clone-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: amazon_clone
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: amazon-clone-web
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/amazon_clone
      JWT_SECRET: amazon-clone-dev-secret-key-2024
      NODE_ENV: development
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    command: >
      sh -c "npx prisma db push && npx prisma db seed && npm run dev"

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
